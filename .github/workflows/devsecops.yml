name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/flask-app
  IMAGE_TAG: 1.0.${{ github.run_number }}

jobs:

  # ============================================================
  # JOB 1 — LINT & TEST
  # ============================================================
  lint-and-test:
    name: Lint & Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff linter
        run: |
          ruff check app/
          echo "Lint passed"

      - name: Run Ruff formatter check
        run: |
          ruff format --check app/

      - name: Run tests with coverage
        run: |
          python3 -m pytest app/tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # JOB 2 — SONARQUBE ANALYSIS
  # =============================================================
  sonarqube:
    name: SonarQube
    runs-on: self-hosted
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for better analysis

      - name: Generate coverage for SonarQube
        run: |
          python3 -m pytest app/tests/ --cov=app --cov-report=xml:coverage.xml -q

      - name: Port-forward SonarQube
        run: |
          kubectl port-forward svc/sonarqube-sonarqube 9000:9000 -n sonarqube &
          echo $! > /tmp/sonar-pf.pid
          sleep 8

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Stop port-forward
        if: always()
        run: |
          kill $(cat /tmp/sonar-pf.pid) 2>/dev/null || true

  # ============================================================
  # JOB 3 — BUILD IMAGE + GENERATE SBOM
  # ============================================================
  build-and-sbom:
    name: Build Image & Generate SBOM
    runs-on: self-hosted
    needs: sonarqube
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          syft ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o spdx-json=sbom-spdx.json \
            -o cyclonedx-json=sbom-cyclonedx.json \
            -o table

      - name: Print SBOM summary
        run: |
          echo "SBOM generated in both SPDX and CycloneDX formats"
          echo "Total packages found:"
          cat sbom-spdx.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          pkgs=data.get('packages',[])
          print(f'  SPDX packages: {len(pkgs)}')
          "

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json

  # ============================================================
  # JOB 4 — IMAGE SCANNING (Trivy + Snyk + StackRox)
  # ============================================================
  scan-image:
    name: Scan Image
    runs-on: self-hosted
    needs: build-and-sbom
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Trivy ──────────────────────────────────────────────
      - name: Trivy — scan filesystem (repo)
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table

      - name: Trivy — scan Docker image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Trivy — generate JSON report
        run: |
          trivy image \
            --format json \
            --output trivy-report.json \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Trivy — generate SARIF report
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      # ── Snyk ───────────────────────────────────────────────
      - name: Snyk — authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk — scan Python dependencies
        run: |
          snyk test \
            --file=app/requirements.txt \
            --severity-threshold=high \
            --json > snyk-deps-report.json || true
          echo "Snyk dependency scan complete"

      - name: Snyk — scan Docker image
        run: |
          snyk container test \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --severity-threshold=high \
            --json > snyk-container-report.json || true
          echo "Snyk container scan complete"

      - name: Snyk — monitor (upload to snyk.io dashboard)
        run: |
          snyk monitor \
            --file=app/requirements.txt \
            --project-name=flask-devsecops || true

      # ── StackRox / ACS ─────────────────────────────────────
      - name: StackRox — scan image
        env:
          ROX_API_TOKEN: ${{ secrets.ROX_API_TOKEN }}
          ROX_ENDPOINT: ${{ secrets.ROX_CENTRAL_ENDPOINT }}
        run: |
          roxctl image scan \
            --endpoint $ROX_ENDPOINT \
            --insecure-skip-tls-verify \
            --image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --output table || true
        continue-on-error: true

      - name: StackRox — check image against policies
        env:
          ROX_API_TOKEN: ${{ secrets.ROX_API_TOKEN }}
          ROX_ENDPOINT: ${{ secrets.ROX_CENTRAL_ENDPOINT }}
        run: |
          roxctl image check \
            --endpoint $ROX_ENDPOINT \
            --insecure-skip-tls-verify \
            --image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
        continue-on-error: true

      # ── Upload all scan reports ─────────────────────────────
      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: |
            trivy-report.json
            trivy-results.sarif
            snyk-deps-report.json
            snyk-container-report.json
  # ============================================================
  # JOB 5 — SIGN IMAGE WITH COSIGN + VERIFY VIA STACKROX/ACS
  # ============================================================
  sign-image:
    name: Sign Image with Cosign
    runs-on: self-hosted
    needs: [build-and-sbom, scan-image]

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Sign image with Cosign (no transparency log)
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key

          # Explicitly disable both tlog-upload and use-signing-config.
          # In Cosign v3, --use-signing-config defaults to true which conflicts with --tlog-upload=false.
          # We explicitly set the container identity to include docker.io.
          # Cosign defaults to index.docker.io which causes StackRox to reject the signature due to string mismatch.
          cosign sign --yes \
            --key cosign.key \
            --tlog-upload=false \
            --use-signing-config=false \
            --sign-container-identity="docker.io/${{ env.IMAGE_NAME }}" \
            docker.io/${{ env.IMAGE_NAME }}@${{ needs.build-and-sbom.outputs.image_digest }}

          echo "Image signed successfully"
          rm -f cosign.key

      - name: EXTRACT TRUE PUBLIC KEY FOR STACKROX
        env:
          PKEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          echo "::warning::YOUR STACKROX PUBLIC KEY IS WRONG. COPY THE KEY BELOW:"
          echo "Remove the spaces and paste this exact key into StackRox Signature Integration:"
          echo "$PKEY" | sed 's/./& /g'

      - name: Verify cosign signature (OCI registry check)
        run: |
          echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > cosign.pub

          cosign verify -d \
            --key cosign.pub \
            --insecure-ignore-tlog=true \
            --insecure-ignore-sct=true \
            docker.io/${{ env.IMAGE_NAME }}@${{ needs.build-and-sbom.outputs.image_digest }} \
            | python3 -m json.tool

          rm -f cosign.pub
          echo "Cosign signature verified in registry"

      # Signature verification is enforced by StackRox/ACS via the
      # "Enforce Image Signature" policy configured with the cosign.
      # public key under Platform Configuration → Signature Integrations.
      # We force a rescan first so ACS picks up the signature written above;
      # without --force it uses the cached pre-signing scan from Job 4.
      # continue-on-error: ACS admission control is the real enforcement gate,
      # at deploy time; this step is informational in CI.
      - name: Verify signature policy via StackRox (roxctl)
        continue-on-error: true
        env:
          ROX_API_TOKEN: ${{ secrets.ROX_API_TOKEN }}
          ROX_ENDPOINT: ${{ secrets.ROX_CENTRAL_ENDPOINT }}
        run: |
          # Force ACS to rescan the image now that the cosign signature is attached.
          roxctl image scan \
            --endpoint "$ROX_ENDPOINT" \
            --insecure-skip-tls-verify \
            --image "docker.io/${{ env.IMAGE_NAME }}@${{ needs.build-and-sbom.outputs.image_digest }}" \
            --force \
            --output json > /dev/null

          # Check policies. Capture JSON to file so python pretty-print
          # does not swallow roxctl's non-zero exit code on violations.
          set +e
          roxctl image check \
            --endpoint "$ROX_ENDPOINT" \
            --insecure-skip-tls-verify \
            --image "docker.io/${{ env.IMAGE_NAME }}@${{ needs.build-and-sbom.outputs.image_digest }}" \
            --force \
            --output json > roxctl-check.json
          ROX_EXIT=$?
          set -e

          python3 -m json.tool roxctl-check.json || true
          rm -f roxctl-check.json

          if [ $ROX_EXIT -ne 0 ]; then
            echo "::warning::StackRox signature policy check failed (exit $ROX_EXIT)."
            echo "::warning::Check that the ACS Signature Integration public key matches the COSIGN_PUBLIC_KEY secret."
            echo "::warning::ACS admission control will still block unsigned images at deploy time."
          else
            echo "StackRox signature policy check passed"
          fi

      - name: Attach SBOM to image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          echo "Attaching SBOM to image..."
          rm -f cosign.key

  # ============================================================
  # JOB 6 — UPDATE GITOPS MANIFEST & DEPLOY VIA ARGOCD
  # ============================================================
  deploy:
    name: Update GitOps & Deploy
    runs-on: self-hosted
    needs: [build-and-sbom, sign-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          fetch-depth: 0

      - name: Update image tag in k8s manifest
        run: |
          sed -i -E "s|image: .*/flask-app:.*|image: docker.io/${{ env.IMAGE_NAME }}@${{ needs.build-and-sbom.outputs.image_digest }}|g" \
            k8s/deployment.yaml

          echo "Updated deployment.yaml:"
          grep "image:" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          git commit -m "ci: update image digest to ${{ needs.build-and-sbom.outputs.image_digest }} [skip ci]

          Pipeline run: ${{ github.run_number }}
          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}" || echo "No changes to commit"

          git push origin main

      - name: Sync ArgoCD application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync flask-app \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 120 || echo "ArgoCD sync skipped (cluster not reachable from CI — ArgoCD will auto-sync from git)"

      - name: Wait for ArgoCD rollout
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait flask-app \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 120 \
            --health || echo "ArgoCD wait skipped"

      - name: Pipeline summary
        run: |
          echo "============================================"
          echo "  DevSecOps Pipeline Complete"
          echo "============================================"
          echo "  Image:    ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Actor:    ${{ github.actor }}"
          echo "  Run:      ${{ github.run_number }}"
          echo "  Status:   SUCCESS"
          echo "============================================"
          echo ""
          echo "  Stages completed:"
          echo "    Lint + Test       ✓"
          echo "    SonarQube         ✓"
          echo "    Build + SBOM      ✓"
          echo "    Trivy scan        ✓"
          echo "    Snyk scan         ✓"
          echo "    StackRox scan     ✓"
          echo "    Cosign sign       ✓"
          echo "    GitOps update     ✓"
          echo "    ArgoCD deploy     ✓"
          echo "============================================"