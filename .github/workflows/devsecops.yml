name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/flask-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ============================================================
  # JOB 1 — LINT & TEST
  # ============================================================
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov flask
          pip install -r app/requirements.txt

      - name: Run Ruff linter
        run: |
          ruff check app/
          echo "Lint passed"

      - name: Run Ruff formatter check
        run: |
          ruff format --check app/

      - name: Run tests with coverage
        run: |
          pytest app/tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # JOB 2 — SONARQUBE ANALYSIS + AI REVIEW
  # ============================================================
  sonarqube:
    name: SonarQube + AI Code Review
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for better analysis

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies & generate coverage
        run: |
          pip install pytest pytest-cov flask
          pip install -r app/requirements.txt
          pytest app/tests/ --cov=app --cov-report=xml:coverage.xml -q

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
        continue-on-error: true

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: AI Code Review with Claude
        uses: anthropics/anthropic-ai-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          review_type: "security"
          files: "app/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 3 — BUILD IMAGE + GENERATE SBOM
  # ============================================================
  build-and-sbom:
    name: Build Image & Generate SBOM
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Syft (SBOM generator)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX format)
        run: |
          syft ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o spdx-json=sbom-spdx.json \
            -o cyclonedx-json=sbom-cyclonedx.json \
            -o table

      - name: Generate SBOM (CycloneDX format)
        run: |
          echo "SBOM generated in both SPDX and CycloneDX formats"
          echo "Total packages found:"
          cat sbom-spdx.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          pkgs=data.get('packages',[])
          print(f'  SPDX packages: {len(pkgs)}')
          "

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json

  # ============================================================
  # JOB 4 — IMAGE SCANNING (Trivy + Snyk + StackRox)
  # ============================================================
  scan-image:
    name: Scan Image
    runs-on: ubuntu-latest
    needs: build-and-sbom

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── Trivy ──────────────────────────────────────────────
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb \
            $(lsb_release -sc) main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy — scan filesystem (repo)
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table

      - name: Trivy — scan Docker image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --format table \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Trivy — generate JSON report
        run: |
          trivy image \
            --format json \
            --output trivy-report.json \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Trivy — generate SARIF report
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      # ── Snyk ───────────────────────────────────────────────
      - name: Install Snyk CLI
        run: |
          curl -sL https://static.snyk.io/cli/latest/snyk-linux \
            -o /usr/local/bin/snyk && chmod +x /usr/local/bin/snyk

      - name: Snyk — authenticate
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk — scan Python dependencies
        run: |
          snyk test \
            --file=app/requirements.txt \
            --severity-threshold=high \
            --json > snyk-deps-report.json || true
          echo "Snyk dependency scan complete"

      - name: Snyk — scan Docker image
        run: |
          snyk container test \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --severity-threshold=high \
            --json > snyk-container-report.json || true
          echo "Snyk container scan complete"

      - name: Snyk — monitor (upload to snyk.io dashboard)
        run: |
          snyk monitor \
            --file=app/requirements.txt \
            --project-name=flask-devsecops || true

      # ── StackRox / ACS ─────────────────────────────────────
      - name: Install roxctl
        run: |
          curl -sL https://mirror.openshift.com/pub/rhacs/assets/latest/bin/linux/roxctl \
            -o /usr/local/bin/roxctl && chmod +x /usr/local/bin/roxctl
          roxctl version

      - name: StackRox — scan image
        env:
          ROX_API_TOKEN: ${{ secrets.ROX_API_TOKEN }}
          ROX_ENDPOINT: ${{ secrets.ROX_CENTRAL_ENDPOINT }}
        run: |
          roxctl image scan \
            --endpoint $ROX_ENDPOINT \
            --insecure-skip-tls-verify \
            --image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --output table || true
        continue-on-error: true

      - name: StackRox — check image against policies
        env:
          ROX_API_TOKEN: ${{ secrets.ROX_API_TOKEN }}
          ROX_ENDPOINT: ${{ secrets.ROX_CENTRAL_ENDPOINT }}
        run: |
          roxctl image check \
            --endpoint $ROX_ENDPOINT \
            --insecure-skip-tls-verify \
            --image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true
        continue-on-error: true

      # ── Upload all scan reports ─────────────────────────────
      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: |
            trivy-report.json
            trivy-results.sarif
            snyk-deps-report.json
            snyk-container-report.json

  # ============================================================
  # JOB 5 — SIGN IMAGE WITH COSIGN
  # ============================================================
  sign-image:
    name: Sign Image with Cosign
    runs-on: ubuntu-latest
    needs: scan-image

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Sign image with Cosign (key-based)
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key

          cosign sign --yes \
            --key cosign.key \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          echo "Image signed successfully"
          rm -f cosign.key

      - name: Verify image signature
        run: |
          echo "${{ secrets.COSIGN_PUBLIC_KEY }}" > cosign.pub

          cosign verify \
            --key cosign.pub \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            | python3 -m json.tool

          rm -f cosign.pub
          echo "Signature verified successfully"

      - name: Attach SBOM to image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key

          # Download SBOM artifact
          echo "Attaching SBOM to image..."

          rm -f cosign.key

  # ============================================================
  # JOB 6 — UPDATE GITOPS MANIFEST & DEPLOY VIA ARGOCD
  # ============================================================
  deploy:
    name: Update GitOps & Deploy
    runs-on: ubuntu-latest
    needs: sign-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          fetch-depth: 0

      - name: Update image tag in k8s manifest
        run: |
          # Replace the image tag in deployment.yaml
          sed -i "s|image: ${{ secrets.DOCKER_USERNAME }}/flask-app:.*|image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}|g" \
            k8s/deployment.yaml

          echo "Updated deployment.yaml:"
          grep "image:" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          git commit -m "ci: update image tag to ${{ env.IMAGE_TAG }}

          Pipeline run: ${{ github.run_number }}
          Triggered by: ${{ github.actor }}
          Commit: ${{ github.sha }}" || echo "No changes to commit"

          git push origin main

      - name: Install ArgoCD CLI
        run: |
          curl -sL https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 \
            -o /usr/local/bin/argocd && chmod +x /usr/local/bin/argocd

      - name: Sync ArgoCD application
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app sync flask-app \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 120 || echo "ArgoCD sync skipped (cluster not reachable from CI — ArgoCD will auto-sync from git)"

      - name: Wait for ArgoCD rollout
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          argocd app wait flask-app \
            --server $ARGOCD_SERVER \
            --auth-token $ARGOCD_AUTH_TOKEN \
            --insecure \
            --timeout 120 \
            --health || echo "ArgoCD wait skipped"

      - name: Pipeline summary
        run: |
          echo "============================================"
          echo "  DevSecOps Pipeline Complete"
          echo "============================================"
          echo "  Image:    ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "  Commit:   ${{ github.sha }}"
          echo "  Actor:    ${{ github.actor }}"
          echo "  Run:      ${{ github.run_number }}"
          echo "  Status:   SUCCESS"
          echo "============================================"
          echo ""
          echo "  Stages completed:"
          echo "    Lint + Test       ✓"
          echo "    SonarQube         ✓"
          echo "    Build + SBOM      ✓"
          echo "    Trivy scan        ✓"
          echo "    Snyk scan         ✓"
          echo "    StackRox scan     ✓"
          echo "    Cosign sign       ✓"
          echo "    GitOps update     ✓"
          echo "    ArgoCD deploy     ✓"
          echo "============================================"